name: Cleanup Screenshots

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to clean up'
        required: false
        default: 'feature/ai-agent-development'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check for ai-screenshots changes
        id: check
        run: |
          if [ -d "ai-screenshots" ] && [ "$(ls -A ai-screenshots)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Remove screenshots and restore gitignore
        if: steps.check.outputs.has_changes == 'true'
        run: |
          rm -rf ai-screenshots
          mkdir -p ai-screenshots
          
          if ! grep -q "^ai-screenshots/$" .gitignore; then
            echo "ai-screenshots/" >> .gitignore
          fi
          
          git add -A
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Remove ai-screenshots and restore gitignore" || echo "Nothing to clean up"
          
          git push origin HEAD:main || git push origin HEAD:main --force
