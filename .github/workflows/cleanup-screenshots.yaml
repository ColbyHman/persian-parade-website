name: Cleanup Screenshots

on:
  pull_request:
    types: [closed]
    paths:
      - 'ai-screenshots/**'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove screenshots and restore gitignore
        run: |
          rm -rf ai-screenshots
          mkdir -p ai-screenshots
          
          if ! grep -q "^ai-screenshots/$" .gitignore; then
            echo "ai-screenshots/" >> .gitignore
          fi
          
          git add -A
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Remove ai-screenshots and restore gitignore" || echo "Nothing to clean up"
          
          git push origin HEAD:main || git push origin HEAD:main --force
