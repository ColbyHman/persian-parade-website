name: Cleanup Screenshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to clean up'
        required: false
        default: 'feature/ai-agent-development'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'feature/ai-agent-development' }}
          fetch-depth: 0

      - name: Remove screenshots and restore gitignore
        run: |
          rm -rf ai-screenshots
          mkdir -p ai-screenshots
          
          if ! grep -q "^ai-screenshots/$" .gitignore; then
            echo "ai-screenshots/" >> .gitignore
          fi
          
          git add -A
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Remove ai-screenshots and restore gitignore" || echo "Nothing to clean up"
          
          git push origin HEAD || echo "Branch may be deleted"
